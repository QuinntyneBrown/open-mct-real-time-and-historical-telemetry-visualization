<mat-toolbar color="primary" class="toolbar">
  <span>Telemetry Visualization</span>
</mat-toolbar>
<main class="main-content">
  <mat-card class="telemetry-card">
    <h1>Telemetry Panel</h1>
    <mat-form-field appearance="fill" class="telemetry-selector" style="width: 100%;">
      <mat-label>Telemetry Source</mat-label>
      <mat-select disabled>
        <mat-option value="" disabled selected>Select telemetry</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-button-toggle-group class="mode-toggle" disabled>
      <mat-button-toggle value="live">Live</mat-button-toggle>
      <mat-button-toggle value="historical">Historical</mat-button-toggle>
    </mat-button-toggle-group>
    <div class="chart-placeholder">
      <mat-icon>show_chart</mat-icon>
      <span>Chart will appear here</span>
    </div>
  </mat-card>
</main>
